name: GitChess CI & Validation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: pytest

      - name: Verify board FEN consistency
        run: |
          python3 -c "from git_chess.engine import GitChessEngine; engine = GitChessEngine(); print('FEN OK:', engine.board.fen())"
